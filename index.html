<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>World Cup Sweepstake</title>
<style>
body { font-family: Arial; max-width: 1100px; margin:auto; padding:20px; background:#f5f7fb; }
h1 { text-align:center; }
.section { margin-top:30px; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:15px; }
.card { background:white; border-radius:12px; padding:15px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
.name { font-weight:bold; margin-bottom:8px; }
.team { display:flex; align-items:center; gap:8px; }
img.flag { width:28px; height:20px; border-radius:3px; }
.draw-container { background:white; padding:15px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
.draw-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.draw-item { padding:8px; border-bottom:1px solid #eee; font-size:14px; }
.draw-title { font-weight:bold; margin-bottom:10px; }
</style>
</head>
<body>

<h1>🏆 World Cup Sweepstake</h1>

<div class="section">
  <div class="draw-container">
    <div class="draw-title">📋 Official Draw (Locked)</div>
    <div id="draw" class="draw-grid"></div>
  </div>
</div>

<div id="list" class="grid section"></div>

<script>
let data = JSON.parse(localStorage.getItem("drawData")) || [];

const countryCodes = {
"Brazil":"br","France":"fr","Argentina":"ar","England":"gb","Spain":"es","Germany":"de","Portugal":"pt","Netherlands":"nl",
"Belgium":"be","Italy":"it","USA":"us","Mexico":"mx","Canada":"ca","Japan":"jp","South Korea":"kr","Australia":"au",
"Morocco":"ma","Egypt":"eg","Senegal":"sn","Nigeria":"ng","Ghana":"gh","Ivory Coast":"ci","Algeria":"dz","Tunisia":"tn",
"Qatar":"qa","Saudi Arabia":"sa","Iran":"ir","Iraq":"iq","UAE":"ae","China":"cn","India":"in","New Zealand":"nz",
"Chile":"cl","Colombia":"co","Peru":"pe","Uruguay":"uy","Paraguay":"py","Bolivia":"bo","Costa Rica":"cr","Panama":"pa",
"Honduras":"hn","Jamaica":"jm","Cuba":"cu","South Africa":"za","Cameroon":"cm","Mali":"ml","Zambia":"zm","Uganda":"ug"
};

// ✅ Load CSV once (locked after first load)
if (data.length === 0) {
  fetch("./sweepstake.csv")
    .then(res => res.text())
    .then(text => {
      text = text.replace(/^\uFEFF/, "");
      const rows = text.trim().split(/\r?\n/);

      data = rows.slice(1).map(row => {
        const cols = row.split(/[;,]/);
        const name = cols[0];
        const team = cols[1];

        if (!name || !team) return null;

        return {
          name: name.trim(),
          team: team.trim(),
          code: countryCodes[team.trim()] || ""
        };
      }).filter(Boolean);

      localStorage.setItem("drawData", JSON.stringify(data)); // 🔒 lock it
      render();
    })
    .catch(() => {
      document.getElementById("draw").innerHTML =
        "<p style='color:red;'>❌ Error loading CSV</p>";
    });
} else {
  render();
}

function render() {
  const list = document.getElementById("list");
  const draw = document.getElementById("draw");

  list.innerHTML = "";
  draw.innerHTML = "";

  // ✅ Draw follows CSV order exactly
  data.forEach(player => {
    const el = document.createElement("div");
    el.className = "draw-item";
    el.textContent = `${player.name} - ${player.team}`;
    draw.appendChild(el);
  });

  // ✅ Cards with proper flag images
  data.forEach(player => {
    const div = document.createElement("div");
    div.className = "card";

    const flagHTML = player.code
    const flagHTML = player.code
      ? `<img class="flag" src="https://flagcdn.com/w40/${player.code}.png">`
      : "";

    div.innerHTML = `
      <div class="name">${player.name}</div>
      <div class="team">${flagHTML} ${player.team}</div>
    `;

    list.appendChild(div);
  });
}
</script>

</body>
</html>
