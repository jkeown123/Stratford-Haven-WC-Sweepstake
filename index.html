<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>World Cup Sweepstake</title>
<style>
body {
  font-family: Arial;
  max-width: 1100px;
  margin:auto;
  padding:20px;
  background:#f5f7fb;
}

h1 { text-align:center; }

input {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

.section { margin-top:30px; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
}

.card {
  background:white;
  border-radius:12px;
  padding:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.name {
  font-weight:bold;
  margin-bottom:8px;
}

.team {
  display:flex;
  align-items:center;
  gap:8px;
}

img.flag {
  width:28px;
  height:20px;
  border-radius:3px;
}

/* Draw section */
.draw-container {
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.draw-grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.draw-item {
  padding:8px;
  border-bottom:1px solid #eee;
  font-size:14px;
}

.draw-title {
  font-weight:bold;
  margin-bottom:10px;
}
</style>
</head>

<body>

<h1>🏆 World Cup Sweepstake</h1>

<input id="search" placeholder="Search by name or team...">

<!-- DRAW -->
<div class="section">
  <div class="draw-container">
    <div class="draw-title">📋 Full Draw Overview</div>
    <div id="draw" class="draw-grid"></div>
  </div>
</div>

<!-- CARDS -->
<div id="list" class="grid section"></div>

<script>
let data = [];

const list = document.getElementById("list");
const draw = document.getElementById("draw");
const search = document.getElementById("search");

const countryCodes = {
"Brazil":"br","France":"fr","Argentina":"ar","England":"gb",
"Spain":"es","Germany":"de","Portugal":"pt","Netherlands":"nl",
"Belgium":"be","Italy":"it","USA":"us","Mexico":"mx",
"Canada":"ca","Japan":"jp","South Korea":"kr","Australia":"au",
"Morocco":"ma","Egypt":"eg","Senegal":"sn","Nigeria":"ng",
"Ghana":"gh","Ivory Coast":"ci","Algeria":"dz","Tunisia":"tn",
"Qatar":"qa","Saudi Arabia":"sa","Iran":"ir","Iraq":"iq",
"UAE":"ae","China":"cn","India":"in","New Zealand":"nz",
"Chile":"cl","Colombia":"co","Peru":"pe","Uruguay":"uy",
"Paraguay":"py","Bolivia":"bo","Costa Rica":"cr","Panama":"pa",
"Honduras":"hn","Jamaica":"jm","Cuba":"cu","South Africa":"za",
"Cameroon":"cm","Mali":"ml","Zambia":"zm","Uganda":"ug"
};

// ✅ LOAD CSV AUTOMATICALLY
fetch("sweepstake.csv")
  .then(res => res.text())
  .then(text => {
    const rows = text.trim().split("\n");

    data = rows.slice(1).map(row => {
      const [name, team] = row.split(",");
      if (!name || !team) return null;

      return {
        name: name.trim(),
        team: team.trim(),
        code: countryCodes[team.trim()] || ""
      };
    }).filter(Boolean);

    render();
  });

function render() {
  const value = search.value.toLowerCase();

  list.innerHTML = "";
  draw.innerHTML = "";

  const filtered = data.filter(p =>
    p.name.toLowerCase().includes(value) ||
    p.team.toLowerCase().includes(value)
  );

  // ✅ DRAW OVERVIEW
  data.forEach(player => {
    const el = document.createElement("div");
    el.className = "draw-item";
    el.innerHTML = `${player.name} - ${player.team}`;
    draw.appendChild(el);
  });

  // ✅ CARDS
  filtered.forEach(player => {
    const div = document.createElement("div");
    div.className = "card";

    const flagHTML = player.code
      ? `<img class="flag" src="https://flagcdn.com/w40/${player.code}.png`">`
      : "";

    div.innerHTML = `
      <div class="name">${player.name}</div>
      <div class="team">${flagHTML} ${player.team}</div>
    `;

    list.appendChild(div);
  });
}

search.addEventListener("input", render);
</script>

</body>
</html>
