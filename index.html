<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>World Cup Sweepstake</title>

<style>
body {
  font-family: Arial;
  max-width: 1200px;
  margin: auto;
  padding: 20px;
  background: #f5f7fb;
}

h1 {
  text-align: center;
}

/* Prize box */
.prizes {
  background: white;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  margin-bottom: 25px;
}

/* Groups layout */
.groups {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
}

.group {
  background: white;
  border-radius: 12px;
  padding: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.group h3 {
  margin-top: 0;
  border-bottom: 2px solid #eee;
  padding-bottom: 5px;
}

/* Team rows */
.team {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 8px 0;
}

.player {
  font-weight: bold;
  min-width: 90px;
}

img.flag {
  width: 24px;
  height: 18px;
  border-radius: 3px;
}
</style>

</head>

<body>

<h1>🏆 World Cup Sweepstake</h1>

<div class="prizes">
  <h2>💰 Prize Breakdown</h2>

  <p><strong>Main Prizes:</strong></p>
  <ul>
    <li>🥇 Winner – £75</li>
    <li>🥈 Runner-up – £40</li>
    <li>🥉 Losing Semi-Finalists – £15 each</li>
  </ul>

  <p><strong>Wooden Spoon Awards:</strong></p>
  <ul>
    <li>📉 Most goals conceded (group stage) – £15</li>
    <li>🟥 Most red cards (yellow cards tie-break) – £15</li>
    <li>⚽ Fewest goals scored – £15</li>
  </ul>
</div>

<div id="groups" class="groups"></div>

<script>
const groupsContainer = document.getElementById("groups");

const countryCodes = {
  "USA":"us","Mexico":"mx","Canada":"ca","Panama":"pa","Haiti":"ht","Curaçao":"cw",
  "Argentina":"ar","Brazil":"br","Colombia":"co","Ecuador":"ec","Paraguay":"py","Uruguay":"uy",
  "England":"gb-eng","France":"fr","Spain":"es","Portugal":"pt","Germany":"de",
  "Netherlands":"nl","Belgium":"be","Croatia":"hr","Switzerland":"ch","Norway":"no",
  "Scotland":"gb-sct","Austria":"at","Bosnia and Herzegovina":"ba","Sweden":"se",
  "Türkiye":"tr","Czechia":"cz",
  "Algeria":"dz","Cabo Verde":"cv","DR Congo":"cd","Ivory Coast":"ci",
  "Egypt":"eg","Ghana":"gh","Morocco":"ma","Senegal":"sn","South Africa":"za","Tunisia":"tn",
  "Japan":"jp","IR Iran":"ir","South Korea":"kr","Saudi Arabia":"sa",
  "Qatar":"qa","Australia":"au","Uzbekistan":"uz","Jordan":"jo","Iraq":"iq",
  "New Zealand":"nz"
};

// ✅ FIFA groups
const groupMap = {
  "Group A": ["Mexico","South Africa","South Korea","Czechia"],
  "Group B": ["Canada","Bosnia and Herzegovina","Qatar","Switzerland"],
  "Group C": ["Brazil","Morocco","Haiti","Scotland"],
  "Group D": ["USA","Paraguay","Türkiye","Australia"],
  "Group E": ["Germany","Curaçao","Ivory Coast","Ecuador"],
  "Group F": ["Netherlands","Japan","Sweden","Tunisia"],
  "Group G": ["Belgium","Egypt","IR Iran","New Zealand"],
  "Group H": ["Spain","Cabo Verde","Saudi Arabia","Uruguay"],
  "Group I": ["France","Senegal","Iraq","Norway"],
  "Group J": ["Argentina","Algeria","Austria","Jordan"],
  "Group K": ["Portugal","DR Congo","Uzbekistan","Colombia"],
  "Group L": ["England","Croatia","Ghana","Panama"]
};

// ✅ Load CSV
fetch("sweepstake.csv")
  .then(res => res.text())
  .then(text => {
    const rows = text.trim().split(/\r?\n/);

    const data = rows.slice(1).map(row => {
      const [name, team] = row.split(/[;,]/);
      if (!name || !team) return null;

      return {
        name: name.trim(),
        team: team.trim()
      };
    }).filter(Boolean);

    renderGroups(data);
  });

// ✅ SAFE RENDER (no innerHTML strings)
function renderGroups(data) {

  groupsContainer.innerHTML = "";

  Object.keys(groupMap).forEach(groupName => {

    const groupDiv = document.createElement("div");
    groupDiv.className = "group";

    const title = document.createElement("h3");
    title.textContent = groupName;
    groupDiv.appendChild(title);

    groupMap[groupName].forEach(teamName => {

      const player = data.find(p => p.team === teamName);

      const row = document.createElement("div");
      row.className = "team";

      // player name
      const playerSpan = document.createElement("span");
      playerSpan.className = "player";
      playerSpan.textContent = player ? player.name : "-";

      row.appendChild(playerSpan);

      // flag
      const code = countryCodes[teamName];
      if (code) {
        const img = document.createElement("img");
        img.className = "flag";
        img.src = "https://flagcdn.com/w40/" + code + ".png";
        row.appendChild(img);
      }

      // team name
      const teamSpan = document.createElement("span");
      teamSpan.textContent = teamName;

      row.appendChild(teamSpan);

      groupDiv.appendChild(row);
    });

    groupsContainer.appendChild(groupDiv);
  });
}
</script>

</body>
</html>
