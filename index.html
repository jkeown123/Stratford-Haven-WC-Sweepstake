<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>World Cup Sweepstake</title>

<style>
body {
  font-family: Arial;
  max-width: 1100px;
  margin: auto;
  padding: 20px;
  background: #f5f7fb;
}

h1 { text-align: center; }

.prizes {
  background: white;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  margin-bottom: 25px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.name {
  font-weight: bold;
  margin-bottom: 8px;
}

.team {
  display: flex;
  align-items: center;
  gap: 8px;
}

img.flag {
  width: 28px;
  height: 20px;
  border-radius: 3px;
}
</style>

</head>

<body>

<h1>🏆 World Cup Sweepstake</h1>

<div class="prizes">
  <h2>💰 Prize Breakdown</h2>

  <p><strong>Main Prizes:</strong></p>
  <ul>
    <li>🥇 Winner – £75</li>
    <li>🥈 Runner-up – £40</li>
    <li>🥉 Losing Semi-Finalists – £15 each</li>
  </ul>

  <p><strong>Wooden Spoon Awards:</strong></p>
  <ul>
    <li>📉 Most goals conceded (group stage) – £15</li>
    <li>🟥 Most red cards (yellow cards tie-break) – £15</li>
    <li>⚽ Fewest goals scored – £15</li>
  </ul>
</div>

<div id="groups" class="groups"></div>

<script>
const groupsContainer = document.getElementById("groups");

const countryCodes = {
  "USA":"us","Mexico":"mx","Canada":"ca","Panama":"pa","Haiti":"ht","Curaçao":"cw",
  "Argentina":"ar","Brazil":"br","Colombia":"co","Ecuador":"ec","Paraguay":"py","Uruguay":"uy",
  "England":"gb-eng","France":"fr","Spain":"es","Portugal":"pt","Germany":"de",
  "Netherlands":"nl","Belgium":"be","Croatia":"hr","Switzerland":"ch","Norway":"no",
  "Scotland":"gb-sct","Austria":"at","Bosnia and Herzegovina":"ba","Sweden":"se",
  "Türkiye":"tr","Czechia":"cz",
  "Algeria":"dz","Cabo Verde":"cv","DR Congo":"cd","Ivory Coast":"ci",
  "Egypt":"eg","Ghana":"gh","Morocco":"ma","Senegal":"sn","South Africa":"za","Tunisia":"tn",
  "Japan":"jp","IR Iran":"ir","South Korea":"kr","Saudi Arabia":"sa",
  "Qatar":"qa","Australia":"au","Uzbekistan":"uz","Jordan":"jo","Iraq":"iq",
  "New Zealand":"nz"
};

// ✅ LOAD DATA
fetch("sweepstake.csv")
  .then(res => res.text())
  .then(text => {
    const rows = text.trim().split(/\r?\n/);

    const data = rows.slice(1).map(row => {
      const [name, team] = row.split(/[;,]/);
      if (!name || !team) return null;

      return {
        name: name.trim(),
        team: team.trim()
      };
    }).filter(Boolean);

    renderGroups(data);
  });

// ✅ GROUP LOGIC
function renderGroups(data) {

  groupsContainer.innerHTML = "";

  const groupNames = ["A","B","C","D","E","F","G","H","I","J","K","L"];
  const groupSize = 4;

  groupNames.forEach((groupName, index) => {
    const groupDiv = document.createElement("div");
    groupDiv.className = "group";

    const title = document.createElement("h3");
    title.textContent = "Group " + groupName;
    groupDiv.appendChild(title);

    const start = index * groupSize;
    const groupPlayers = data.slice(start, start + groupSize);

    groupPlayers.forEach(player => {
      const row = document.createElement("div");
      row.className = "team";

      const code = countryCodes[player.team];

      let flag = "";
      if (code) {
        flag = '<img class="flag" src="https://flagcdn.com/w40/' + code + '.png   '<span class="player">' + player.name + '</span>' +
        flag +
        '<span>' + player.team + '</span>';

      groupDiv.appendChild(row);
    });

    groupsContainer.appendChild(groupDiv);
  });
}
</script>

</body>
</html>
