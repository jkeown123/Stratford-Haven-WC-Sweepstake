<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>World Cup Sweepstake</title>

<style>
body {
  font-family: Arial;
  max-width: 1100px;
  margin: auto;
  padding: 20px;
  background: #f5f7fb;
}

h1 {
  text-align: center;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
  margin-top: 30px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.name {
  font-weight: bold;
  margin-bottom: 8px;
}

.team {
  display: flex;
  align-items: center;
  gap: 8px;
}

img.flag {
  width: 28px;
  height: 20px;
  border-radius: 3px;
}
</style>

</head>

<body>

<h1>🏆 World Cup Sweepstake</h1>

<div id="list" class="grid"></div>

<script>
const list = document.getElementById("list");

const countryCodes = {
  "Brazil":"br","France":"fr","Argentina":"ar","Spain":"es","Germany":"de",
  "Portugal":"pt","Netherlands":"nl","Belgium":"be","Italy":"it",
  "USA":"us","Mexico":"mx","Canada":"ca","Japan":"jp","South Korea":"kr",
  "Australia":"au","Morocco":"ma","Egypt":"eg","Senegal":"sn",
  "Nigeria":"ng","Ghana":"gh","Ivory Coast":"ci","Algeria":"dz","Tunisia":"tn",
  "Qatar":"qa","Saudi Arabia":"sa","Iran":"ir","Iraq":"iq","UAE":"ae",
  "China":"cn","India":"in","New Zealand":"nz","Chile":"cl","Colombia":"co",
  "Peru":"pe","Uruguay":"uy","Paraguay":"py","Bolivia":"bo",
  "Costa Rica":"cr","Panama":"pa","Honduras":"hn","Jamaica":"jm",
  "Cuba":"cu","South Africa":"za","Cameroon":"cm","Mali":"ml",
  "Zambia":"zm","Uganda":"ug"
};

fetch("./sweepstake.csv")
  .then(response => response.text())
  .then(text => {
    text = text.replace(/^\uFEFF/, "");
    const rows = text.trim().split(/\r?\n/);

    const data = rows.slice(1).map(row => {
      const cols = row.split(/[;,]/);
      const name = cols[0];
      const team = cols[1];

      if (!name || !team) return null;

      return {
        name: name.trim(),
        team: team.trim()
      };
    }).filter(Boolean);

    render(data);
  })
  .catch(err => {
    console.error(err);
    list.innerHTML = "<p style='color:red;'>❌ CSV failed to load</p>";
  });

function render(data) {
  list.innerHTML = "";

  data.forEach(player => {
    const div = document.createElement("div");
    div.className = "card";

    let flagHTML = "";

    if (player.team === "England") {
      flagHTML = `<img class="flag" src="https://flagcdn.com else {
      const code = countryCodes[player.team];
      if (code) {
        flagHTML = `<img class="flag" src="https://flagcdn.com/w40/${code    div.innerHTML = `
      <div class="name">${player.name}</div>
      <div class="team">${flagHTML} ${player.team}</div>
    `;

    list.appendChild(div);
  });
}
</script>

</body>
</html>
