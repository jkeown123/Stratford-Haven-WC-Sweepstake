<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>World Cup Sweepstake</title>

<style>
body {
  font-family: Arial;
  max-width: 1100px;
  margin: auto;
  padding: 20px;
  background: #f5f7fb;
}

h1 {
  text-align: center;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
  margin-top: 30px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.name {
  font-weight: bold;
  margin-bottom: 8px;
  font-size: 16px;
}

.team {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 15px;
}

img.flag {
  width: 28px;
  height: 20px;
  border-radius: 3px;
}
</style>

</head>

<body>

<h1>🏆 World Cup Sweepstake</h1>

<div id="list" class="grid"></div>

<script>
let data = JSON.parse(localStorage.getItem("drawData")) || [];

// Country → flag code
const countryCodes = {
"Brazil":"br","France":"fr","Argentina":"ar",
"Spain":"es","Germany":"de","Portugal":"pt","Netherlands":"nl",
"Belgium":"be","Italy":"it","USA":"us","Mexico":"mx",
"Canada":"ca","Japan":"jp","South Korea":"kr","Australia":"au",
"Morocco":"ma","Egypt":"eg","Senegal":"sn","Nigeria":"ng",
"Ghana":"gh","Ivory Coast":"ci","Algeria":"dz","Tunisia":"tn",
"Qatar":"qa","Saudi Arabia":"sa","Iran":"ir","Iraq":"iq",
"UAE":"ae","China":"cn","India":"in","New Zealand":"nz",
"Chile":"cl","Colombia":"co","Peru":"pe","Uruguay":"uy",
"Paraguay":"py","Bolivia":"bo","Costa Rica":"cr","Panama":"pa",
"Honduras":"hn","Jamaica":"jm","Cuba":"cu","South Africa":"za",
"Cameroon":"cm","Mali":"ml","Zambia":"zm","Uganda":"ug"
};

// ✅ Load CSV ONCE + LOCK
if (data.length === 0) {
  fetch("./sweepstake.csv")
    .then(res => res.text())
    .then(text => {

      // Remove Excel BOM
      text = text.replace(/^\uFEFF/, "");

      // Handle Windows + Mac line endings
      const rows = text.trim().split(/\r?\n/);

      data = rows.slice(1).map(row => {
        const cols = row.split(/[;,]/); // comma OR semicolon

        const name = cols[0];
        const team = cols[1];

        if (!name || !team) return null;

        return {
          name: name.trim(),
          team: team.trim(),
          code: countryCodes[team.trim()] || ""
        };
      }).filter(Boolean);

      // 🔒 lock results
      localStorage.setItem("drawData", JSON.stringify(data));

      render();
    })
    .catch(() => {
      document.getElementById("list").innerHTML =
        "<p style='color:red;'>❌ Error loading CSV</p>";
    });
} else {
  render();
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(player => {
    const div = document.createElement("div");
    div.className = "card";

    let flagHTML = "";

    // ✅ SPECIAL CASE: England (proper flag)
    if (player.team === "England") {
      flagHTML = `<img class="flag" src="https://flagcdn.com/w40/gb-eng.pnglayer.code) {
      flagHTML = `<img class="flag" src="https://flagcdn.com/w40/${player.code}.png`">`;
    }

    div.innerHTML = `
      <div class="name">${player.name}</div>
      <div class="team">${flagHTML} ${player.team}</div>
    `;

    list.appendChild(div);
  });
}
</script>

</body>
</html>
