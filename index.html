<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stratford Haven World Cup Sweepstake</title>

<style>

/* ✅ DARK THEME */
body {
  font-family: Arial;
  max-width: 1200px;
  margin: auto;
  padding: 20px;
  background: linear-gradient(135deg, #0a1f3d, #000);
  color: #f4f6fb;
}

/* ✅ HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 15px;
  margin-bottom: 25px;
}

.header img {
  height: 60px;
}

h1 {
  margin: 0;
}

/* ✅ CARDS */
.prizes, .group {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(6px);
  border-radius: 12px;
  padding: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.4);
}

/* ✅ PRIZES */
.prizes {
  margin-bottom: 25px;
}

/* ✅ RESPONSIVE GRID (auto adjusts on zoom) */
.groups {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
}

/* ✅ GROUP TITLE */
.group h3 {
  margin-top: 0;
  border-bottom: 2px solid rgba(255,255,255,0.2);
  padding-bottom: 5px;
}

/* ✅ TEAM ROW */
.team {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 6px 0;
}

/* ✅ PLAYER NAMES */
.player {
  font-weight: bold;
  flex: 1;
  min-width: 0;
}

/* ✅ TEAM TEXT (prevents overflow) */
.team span:last-child {
  flex: 1.3;
  min-width: 0;
  overflow-wrap: anywhere;
}

/* ✅ STATS */
.stats {
  color: #90caf9;
  white-space: nowrap;
}

/* ✅ FLAGS */
img.flag {
  width: 24px;
  height: 18px;
  border-radius: 3px;
  flex-shrink: 0;
}

/* ✅ HOVER EFFECT */
.group:hover {
  transform: translateY(-3px);
  transition: 0.2s ease;
}

</style>

</head>

<body>

<!-- ✅ HEADER WITH LOGO -->
<div class="header">
  <img src="logo.png" alt="Stratford Haven FC Logo">
  <h1>🏆 Stratford Haven Sweepstake</h1>
</div>

<!-- ✅ PRIZES -->
<div class="prizes">
  <h2>💰 Prize Breakdown</h2>

  <p><strong>Main Prizes</strong></p>
  <ul>
    <li>🥇 Winner – £75</li>
    <li>🥈 Runner-up – £40</li>
    <li>🥉 Semi-Finalists – £15 each</li>
  </ul>

  <p><strong>Wooden Spoon</strong></p>
  <ul>
    <li>📉 Most goals conceded in group stages – £15</li>
    <li>🟥 Most red cards (yellows as a tie-break) – £15</li>
    <li>⚽ Fewest goals scored in the tournament – £15</li>
  </ul>
</div>

<div id="groups" class="groups"></div>

<script>
const groupsContainer = document.getElementById("groups");

const countryCodes = {
  "USA":"us","Mexico":"mx","Canada":"ca","Panama":"pa","Haiti":"ht","Curaçao":"cw",
  "Argentina":"ar","Brazil":"br","Colombia":"co","Ecuador":"ec","Paraguay":"py","Uruguay":"uy",
  "England":"gb-eng","France":"fr","Spain":"es","Portugal":"pt","Germany":"de",
  "Netherlands":"nl","Belgium":"be","Croatia":"hr","Switzerland":"ch","Norway":"no",
  "Scotland":"gb-sct","Austria":"at","Bosnia and Herzegovina":"ba","Sweden":"se",
  "Türkiye":"tr","Czechia":"cz",
  "Algeria":"dz","Cabo Verde":"cv","DR Congo":"cd","Ivory Coast":"ci",
  "Egypt":"eg","Ghana":"gh","Morocco":"ma","Senegal":"sn","South Africa":"za","Tunisia":"tn",
  "Japan":"jp","IR Iran":"ir","South Korea":"kr","Saudi Arabia":"sa",
  "Qatar":"qa","Australia":"au","Uzbekistan":"uz","Jordan":"jo","Iraq":"iq",
  "New Zealand":"nz"
};

const groupMap = {
  "Group A": ["Mexico","South Africa","South Korea","Czechia"],
  "Group B": ["Canada","Bosnia and Herzegovina","Qatar","Switzerland"],
  "Group C": ["Brazil","Morocco","Haiti","Scotland"],
  "Group D": ["USA","Paraguay","Türkiye","Australia"],
  "Group E": ["Germany","Curaçao","Ivory Coast","Ecuador"],
  "Group F": ["Netherlands","Japan","Sweden","Tunisia"],
  "Group G": ["Belgium","Egypt","IR Iran","New Zealand"],
  "Group H": ["Spain","Cabo Verde","Saudi Arabia","Uruguay"],
  "Group I": ["France","Senegal","Iraq","Norway"],
  "Group J": ["Argentina","Algeria","Austria","Jordan"],
  "Group K": ["Portugal","DR Congo","Uzbekistan","Colombia"],
  "Group L": ["England","Croatia","Ghana","Panama"]
};

// ✅ LOAD CSV
fetch("sweepstake.csv?v=" + Date.now())
  .then(res => res.text())
  .then(text => {

    const rows = text.trim().split(/\r?\n/);

    const data = rows.slice(1).map(row => {
      const parts = row.split(/[;,]/);

      return {
        name1: parts[0]?.trim(),
        name2: parts[1]?.trim() || "",
        team: parts[2]?.trim(),
        goals: parseInt(parts[3]) || 0,
        yellows: parseInt(parts[4]) || 0,
        reds: parseInt(parts[5]) || 0
      };
    }).filter(p => p.name1 && p.team);

    renderGroups(data);
  });

function formatName(p) {
  return p.name2 ? p.name1 + ", " + p.name2 : p.name1;
}

// ✅ RENDER GROUPS
function renderGroups(data) {

  groupsContainer.innerHTML = "";

  Object.keys(groupMap).forEach(groupName => {

    const groupDiv = document.createElement("div");
    groupDiv.className = "group";

    const title = document.createElement("h3");
    title.textContent = groupName;
    groupDiv.appendChild(title);

    groupMap[groupName].forEach(teamName => {

      const player = data.find(p => p.team === teamName);

      const row = document.createElement("div");
      row.className = "team";

      const playerSpan = document.createElement("span");
      playerSpan.className = "player";
      playerSpan.textContent = player ? formatName(player) : "-";
      row.appendChild(playerSpan);

      const code = countryCodes[teamName];
      if (code) {
        const img = document.createElement("img");
        img.className = "flag";
        img.src = "https://flagcdn.com/w40/" + code + ".png";
        row.appendChild(img);
      }

      const teamSpan = document.createElement("span");

      let stats = "";
      if (player) {
        if (player.goals) stats += player.goals + "x⚽ ";
        if (player.yellows) stats += player.yellows + "x🟨 ";
        if (player.reds) stats += player.reds + "x🟥";
      }

      teamSpan.innerHTML =
        teamName +
        (stats ? '<span class="stats"> ' + stats + '</span>' : '');

      row.appendChild(teamSpan);
      groupDiv.appendChild(row);
    });

    groupsContainer.appendChild(groupDiv);
  });
}
</script>

</body>
</html>
