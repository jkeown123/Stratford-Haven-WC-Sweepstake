<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>World Cup Sweepstake</title>

<style>
body {
  font-family: Arial;
  max-width: 1100px;
  margin: auto;
  padding: 20px;
  background: #f5f7fb;
}

h1 {
  text-align: center;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
  margin-top: 30px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.name {
  font-weight: bold;
  margin-bottom: 8px;
}

.team {
  display: flex;
  align-items: center;
  gap: 8px;
}

img.flag {
  width: 28px;
  height: 20px;
  border-radius: 3px;
}
</style>

</head>

<body>

<h1>🏆 World Cup Sweepstake</h1>

<div id="list" class="grid"></div>

<script>
const list = document.getElementById("list");

// ✅ country codes (official 2026 teams)
const countryCodes = {

  // 🌎 North America (hosts + qualifiers)
  "USA":"us","Mexico":"mx","Canada":"ca",
  "Panama":"pa","Haiti":"ht","Curaçao":"cw",

  // 🌎 South America
  "Argentina":"ar","Brazil":"br","Colombia":"co",
  "Ecuador":"ec","Paraguay":"py","Uruguay":"uy",

  // 🌍 Europe
  "England":"gb-eng","France":"fr","Spain":"es","Portugal":"pt",
  "Germany":"de","Netherlands":"nl","Belgium":"be","Croatia":"hr",
  "Switzerland":"ch","Norway":"no","Scotland":"gb-sct","Austria":"at",
  "Bosnia and Herzegovina":"ba","Sweden":"se","Türkiye":"tr","Czechia":"cz",

  // 🌍 Africa
  "Algeria":"dz","Cabo Verde":"cv","DR Congo":"cd","Ivory Coast":"ci",
  "Egypt":"eg","Ghana":"gh","Morocco":"ma","Senegal":"sn",
  "South Africa":"za","Tunisia":"tn",

  // 🌏 Asia
  "Japan":"jp","IR Iran":"ir","South Korea":"kr","Saudi Arabia":"sa",
  "Qatar":"qa","Australia":"au","Uzbekistan":"uz","Jordan":"jo","Iraq":"iq",

  // 🌊 Oceania
  "New Zealand":"nz"
};

// ✅ fetch CSV (correct path)
fetch("/Stratford-Haven-WC-Sweepstake/sweepstake.csv")
  .then(response => response.text())
  .then(text => {

    text = text.replace(/^\uFEFF/, "");
    const rows = text.trim().split(/\r?\n/);

    const data = rows.slice(1).map(row => {
      const cols = row.split(/[;,]/);
      const name = cols[0];
      const team = cols[1];

      if (!name || !team) return null;

      return {
        name: name.trim(),
        team: team.trim()
      };
    }).filter(Boolean);

    render(data);
  })
  .catch(err => {
    console.error(err);
    list.innerHTML = "<p style='color:red'>❌ CSV failed to load</p>";
  });

// ✅ render
function render(data) {
  list.innerHTML = "";

  data.forEach(player => {
    const div = document.createElement("div");
    div.className = "card";

    let flagHTML = "";

    // ✅ IMPORTANT: no broken template strings
    div.innerHTML =
      '<div class=\"name\">' + player.name + '</div>' +
      '<div class=\"team\">' + flagHTML + ' ' + player.team + '</div>';

    list.appendChild(div);
  });
}
</script>

</body>
</html>
