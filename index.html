<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stratford Haven World Cup Sweepstake</title>

<style>

body {
  font-family: Arial;
  max-width: 1200px;
  margin: auto;
  padding: 20px;
  background: linear-gradient(135deg, #0a1f3d, #000);
  color: #f4f6fb;
}

.header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 15px;
  margin-bottom: 25px;
}

.header img {
  height: 60px;
}

h1 { margin: 0; }

.prizes, .group {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(6px);
  border-radius: 12px;
  padding: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.4);
}

.prizes { margin-bottom: 25px; }

.groups {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
}

.group h3 {
  margin-top: 0;
  border-bottom: 2px solid rgba(255,255,255,0.2);
  padding-bottom: 5px;
}

.team {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 6px 0;
}

.player {
  font-weight: bold;
  flex: 1;
}

.team span:last-child {
  flex: 1.3;
  overflow-wrap: anywhere;
}

.stats {
  color: #90caf9;
  white-space: nowrap;
}

img.flag {
  width: 24px;
  height: 18px;
  border-radius: 3px;
}

.group:hover {
  transform: translateY(-3px);
  transition: 0.2s ease;
}

/* ✅ CATEGORY HIGHLIGHTS */
.highlight-conceded {
  color: #ff5252;
  text-shadow: 0 0 6px rgba(255, 82, 82, 0.7);
  font-weight: bold;
}

.highlight-reds {
  color: #ff1744;
  text-shadow: 0 0 6px rgba(255, 23, 68, 0.7);
  font-weight: bold;
}

.highlight-goals {
  color: #40c4ff;
  text-shadow: 0 0 6px rgba(64, 196, 255, 0.7);
  font-weight: bold;
}

/* ✅ Prize highlight */
#mostConceded strong,
#mostReds strong,
#fewestGoals strong {
  color: #ffd54f;
}

</style>
</head>

<body>

<div class="header">
  <img src="logo.png">
  <h1>🏆 Stratford Haven Sweepstake</h1>
</div>

<div class="prizes">
  <h2>💰 Prize Breakdown</h2>

  <p><strong>Main Prizes</strong></p>
  <ul>
    <li>🥇 Winner – £75</li>
    <li>🥈 Runner-up – £40</li>
    <li>🥉 Semi-Finalists – £15 each</li>
  </ul>

  <p><strong>Wooden Spoon</strong></p>
  <ul>
    <li id="mostConceded">📉 Most goals conceded – £15</li>
    <li id="mostReds">🟥 Most red cards (yellows tie-break) – £15</li>
    <li id="fewestGoals">⚽ Fewest goals scored – £15</li>
  </ul>
</div>

<div id="groups" class="groups"></div>

<script>

const groupsContainer = document.getElementById("groups");

/* ✅ TRACKING */
let concededTeams = new Set();
let redTeams = new Set();
let goalTeams = new Set();

const countryCodes = { /* same as your original */ };
const groupMap = { /* same as your original */ };

fetch("sweepstake.csv?v=" + Date.now())
  .then(res => res.text())
  .then(text => {

    const rows = text.trim().split(/\r?\n/);

    const data = rows.slice(1).map(row => {
      const parts = row.split(/[;,]/);

      return {
        name1: parts[0]?.trim(),
        name2: parts[1]?.trim() || "",
        team: parts[2]?.trim(),
        goals: parseInt(parts[3]) || 0,
        yellows: parseInt(parts[4]) || 0,
        reds: parseInt(parts[5]) || 0,
        goalsAgainst: parseInt(parts[6]) || 0,
        matches: parseInt(parts[7]) || 0
      };
    }).filter(p => p.name1 && p.team);

    updateTracker(data);
    renderGroups(data);
  });

function formatName(p) {
  return p.name2 ? p.name1 + ", " + p.name2 : p.name1;
}

/* ✅ TRACKER LOGIC */
function updateTracker(data) {

  const active = data.filter(p => p.matches > 0);
  if (!active.length) return;

  const maxConceded = Math.max(...active.map(p => p.goalsAgainst));
  const concededLeaders = active.filter(p => p.goalsAgainst === maxConceded);

  const maxReds = Math.max(...active.map(p => p.reds));
  const redCandidates = active.filter(p => p.reds === maxReds);
  const maxYellows = Math.max(...redCandidates.map(p => p.yellows));
  const redLeaders = redCandidates.filter(p => p.yellows === maxYellows);

  const minGoals = Math.min(...active.map(p => p.goals));
  const goalLeaders = active.filter(p => p.goals === minGoals);

  concededTeams = new Set(concededLeaders.map(p => p.team));
  redTeams = new Set(redLeaders.map(p => p.team));
  goalTeams = new Set(goalLeaders.map(p => p.team));

  document.getElementById("mostConceded").innerHTML =
    `📉 Most goals conceded – £15 → <strong>${[...concededTeams].join(", ")}</strong> (${maxConceded}x🥅)`;

  document.getElementById("mostReds").innerHTML =
    `🟥 Most red cards (yellows tie-break) – £15 → <strong>${[...redTeams].join(", ")}</strong> (${maxReds}x🟥)`;

  document.getElementById("fewestGoals").innerHTML =
    `⚽ Fewest goals scored – £15 → <strong>${[...goalTeams].join(", ")}</strong> (${minGoals}x⚽)`;
}

/* ✅ RENDER GROUPS */
function renderGroups(data) {

  groupsContainer.innerHTML = "";

  Object.keys(groupMap).forEach(groupName => {

    const groupDiv = document.createElement("div");
    groupDiv.className = "group";

    const title = document.createElement("h3");
    title.textContent = groupName;
    groupDiv.appendChild(title);

    groupMap[groupName].forEach(teamName => {

      const player = data.find(p => p.team === teamName);
      const row = document.createElement("div");
      row.className = "team";

      const playerSpan = document.createElement("span");
      playerSpan.className = "player";
      playerSpan.textContent = player ? formatName(player) : "-";
      row.appendChild(playerSpan);

      const code = countryCodes[teamName];
      if (code) {
        const img = document.createElement("img");
        img.className = "flag";
        img.src = "https://flagcdn.com/w40/" + code + ".png";
        row.appendChild(img);
      }

      const teamSpan = document.createElement("span");

      /* ✅ Determine highlight + tooltip */
      let className = "";
      let tooltip = "";

      if (concededTeams.has(teamName)) {
        className = "highlight-conceded";
        tooltip = "Most goals conceded";
      }
      if (redTeams.has(teamName)) {
        className = "highlight-reds";
        tooltip = "Most red cards";
      }
      if (goalTeams.has(teamName)) {
        className = "highlight-goals";
        tooltip = "Fewest goals scored";
      }

      let stats = "";
      if (player) {
        if (player.goals) stats += player.goals + "x⚽ ";
        if (player.goalsAgainst) stats += player.goalsAgainst + "x🥅 ";
        if (player.yellows) stats += player.yellows + "x🟨 ";
        if (player.reds) stats += player.reds + "x🟥";
      }

      teamSpan.innerHTML =
        `<span class="${className}" title="${tooltip}">${teamName}</span>` +
        (stats ? '<span class="stats"> ' + stats + '</span>' : '');

      row.appendChild(teamSpan);
      groupDiv.appendChild(row);
    });

    groupsContainer.appendChild(groupDiv);
  });
}

</script>

</body>
</html>
