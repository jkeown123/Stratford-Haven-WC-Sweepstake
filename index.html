<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>World Cup Sweepstake</title>
<style>
body {
  font-family: Arial;
  max-width: 1100px;
  margin:auto;
  padding:20px;
  background:#f5f7fb;
}

h1 { text-align:center; }

input {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

.section { margin-top:30px; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
}

.card {
  background:white;
  border-radius:12px;
  padding:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.name {
  font-weight:bold;
  margin-bottom:8px;
}

.team {
  display:flex;
  align-items:center;
  gap:8px;
}

img.flag {
  width:28px;
  height:20px;
  border-radius:3px;
}

/* Draw section */
.draw-container {
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.draw-grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.draw-item {
  padding:8px;
  border-bottom:1px solid #eee;
  font-size:14px;
}

.draw-title {
  font-weight:bold;
  margin-bottom:10px;
}
</style>
</head>

<body>

<h1>🏆 World Cup Sweepstake</h1>

<input id="search" placeholder="Search by name or team...">

<!-- DRAW -->
<div class="section">
  <div class="draw-container">
    <div class="draw-title">📋 Full Draw Overview</div>
    <div id="draw" class="draw-grid"></div>
  </div>
</div>

<!-- CARDS -->
<div id="list" class="grid section"></div>
